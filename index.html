    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {"@type": "Question", "name": "Why is Propel Capital a good early investor for my startup?", "acceptedAnswer": {"@type": "Answer", "text": "Because we offer more than just capital. As Sting's investment arm, a Propel investment comes paired with the Sting Core program — giving you hands-on support, structured sparring and access to Sweden's most experienced startup ecosystem from day one. You also get plugged into our network of 120+ Propel angels — successful founders, operators and executives who actively open doors, share know-how and often follow on in later rounds (we have a ~57% follow-on rate). We move fast, give clear answers, and back you with founder-friendly terms designed for the long run."}},
      {"@type": "Question", "name": "What stage do you invest in?", "acceptedAnswer": {"@type": "Answer", "text": "Pre-seed. We're typically the first institutional cheque and often the first external investor. We're often pre-revenue, sometimes pre-product but normally at least MVP or functional prototype in place with initial traction."}},
      {"@type": "Question", "name": "How much do you invest?", "acceptedAnswer": {"@type": "Answer", "text": "Our standard ticket is 600 kSEK. You receive 400 kSEK upfront as a convertible note and 200 kSEK is co-invested as equity in the next round. After the upfront investment you'll get introduced to the Propel Capital VII angel network. Many companies soon after raise rounds from our angel network, leveraging our 57% follow-on rate. A Propel Capital investment is a great way to kick-start your startup journey."}},
      {"@type": "Question", "name": "What are you looking for?", "acceptedAnswer": {"@type": "Answer", "text": "Exceptional founders building tech-driven impact companies with global potential from Sweden. We back ambitious teams that are ready to go all-in, and that have a bold idea with strong moat, solving a big important societal problem with a large market. You're typically 2-3 founders with an MVP or functional prototype in place, some early signals of traction, and a scalable business. We care more about founder drive, market insight and the ability to execute than a polished pitch."}},
      {"@type": "Question", "name": "What are the investment terms?", "acceptedAnswer": {"@type": "Answer", "text": "We invest 600 kSEK in total: 400 kSEK upfront on a standard convertible note and 200 kSEK as equity in your next priced round on the same terms as the lead. The convertible usually converts in the next round with a 30% discount and a cap. We keep terms founder-friendly, transparent and aligned with market standard for pre-seed in the Nordics. A Propel investment decision also means you're automatically accepted to the Sting Core program, and you will need to sign the Sting Core agreement at the same time as the Propel investment agreement. The Sting Core program fee — a 2% warrant — is additional to the Propel investment."}},
      {"@type": "Question", "name": "Do I have to be in the Sting program?", "acceptedAnswer": {"@type": "Answer", "text": "Yes. Propel Capital is Sting's investment arm and to receive a Propel investment you need to be a Sting company. You become a Sting company by joining the Sting Core or Sting Race program. You can either apply for a Propel investment (a positive decision means acceptance into Sting Core), or apply to Sting Core/Race first and be considered for a Propel investment once you've started the program."}},
      {"@type": "Question", "name": "How long does the process take?", "acceptedAnswer": {"@type": "Answer", "text": "From first contact to signed investment agreement, typically 4–6 weeks. We give you a clear yes or no — never a slow maybe. If you get a no, you can still apply to Sting Core or Sting Race, and if accepted you can be reconsidered for an investment later when your case is stronger."}},
      {"@type": "Question", "name": "Who's behind Propel Capital?", "acceptedAnswer": {"@type": "Answer", "text": "Propel Capital is run and managed by the team at Sting, Sweden's leading startup accelerator and ecosystem builder since 2002. It combines an experienced investment team with a network of 120+ angel investors. Propel Capital I launched in 2014; the current vintage Propel Capital VII launched in 2025 with 27 MSEK in committed capital from 39 angel investors and Saminvest. Emanuel Andersson is the CEO of Propel Capital."}},
      {"@type": "Question", "name": "How does Propel Capital work?", "acceptedAnswer": {"@type": "Answer", "text": "Propel Capital is a rolling pre-seed angel investment company. We invest 600 kSEK per company — 400 kSEK upfront as a convertible and 200 kSEK as equity in the next round — and introduce you to our angel network for follow-on capital, advice and connections. You apply by sending your pitch deck. An investment decision is paired with intake to Sting Core. You need to be headquartered in Sweden."}},
      {"@type": "Question", "name": "What should my pitch deck cover?", "acceptedAnswer": {"@type": "Answer", "text": "Keep it concise (10–15 slides). Cover: your vision and why; the problem and why it matters now; your solution and what makes it hard to copy; market size; business model, go-to-market and scalability; traction so far; competitive landscape and your wedge; the founding team; cap table and any prior investments or grants; 12–18 month roadmap and how you'll use the Propel investment. A short demo video or product screenshots help a lot."}},
      {"@type": "Question", "name": "What sectors do you focus on?", "acceptedAnswer": {"@type": "Answer", "text": "Tech-driven solutions across climate, energy, health, industrials, security, and more, powered by frontier technologies such as AI, next-gen compute, biotech and advanced materials. If your idea has the potential to reshape the future and scale globally from Sweden, we want to hear from you."}},
      {"@type": "Question", "name": "Can international startups apply?", "acceptedAnswer": {"@type": "Answer", "text": "Propel Capital invests in startups registered in Sweden. If you're relocating, let's talk."}},
      {"@type": "Question", "name": "How can I join Propel Capital and become a Propel angel?", "acceptedAnswer": {"@type": "Answer", "text": "Propel angels are experienced founders, operators, investors and executives from the Nordic and European tech ecosystem. As a Propel angel you commit capital to the Propel angel investment company, get access to all investment opportunities, can follow on directly into companies you find exciting, and join a tight-knit club of 120+ peers sharing deal flow, expertise and networks. If you're interested in joining Propel Capital VIII, reach out to propel@sting.co."}}
    ]
